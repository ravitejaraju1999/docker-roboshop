services:
  mongodb:
    image: mongodb:v1
    container_name: mongodb
    restart: always
  catalogue:
    image: catalogue:v1
    container_name: catalogue
    restart: always
    depends_on:
      - mongodb


networks:
  default:
    driver: bridge
    name: roboshop
    external: false #if true if you setup it manually then it will use that network otherwise it will create a new one with the name roboshop
